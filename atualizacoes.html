<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Outfit", "sans-serif"] },
            colors: {
              primary: "rgb(var(--color-primary-rgb) / <alpha-value>)",
              bg: "var(--color-bg)",
              surface: "var(--color-surface)",
              text: "var(--color-text)",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --color-primary: #00eeff;
        --color-primary-rgb: 0 238 255;
        --color-bg: #000005;
        --color-surface: #0c161d;
        --color-text: #f1f5f9;
        --color-text-muted: #94a3b8;
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
    <style id="mobile-simplifier">
      @media (max-width: 768px) {
        * {
          transition: none !important;
          animation: none !important;
          backdrop-filter: none !important;
        }
        .glass-card, [class*="glass"] {
          background-color: rgb(var(--color-surface-rgb) / 0.95) !important;
        }
        .shadow-neon, [class*="shadow-neon"], .hover\:shadow-neon:hover {
          box-shadow: none !important;
        }
      }
    </style>
  </head>
  <body class="p-6 md:p-12 relative">
    <div
      class="fixed inset-0 pointer-events-none"
      style="
        background: radial-gradient(
          circle at 50% 0%,
          var(--color-surface),
          var(--color-bg) 70%
        );
        opacity: 0.8;
        z-index: -1;
      "
    ></div>

    <div class="max-w-4xl mx-auto mt-10">
      <h1
        class="text-4xl md:text-5xl font-bold mb-8 uppercase tracking-widest text-center"
        style="color: var(--color-primary)"
      >
        Atualizações
      </h1>

      <div
        id="changelog-container"
        class="glass-panel p-8 rounded-3xl relative border-l-4 border-l-primary/50 pl-10"
      >
        <!-- Logs dynamically injected here -->
      </div>
    </div>

    <script src="changelog_data.js"></script>
    <script>
      // Load current theme from parent
      try {
        if (
          window.parent &&
          window.parent.document.documentElement.style.getPropertyValue(
            "--color-primary",
          )
        ) {
          const props = [
            "--color-primary",
            "--color-primary-rgb",
            "--color-bg",
            "--color-surface",
            "--color-text",
            "--color-text-muted",
          ];
          props.forEach((p) => {
            document.documentElement.style.setProperty(
              p,
              window.parent.document.documentElement.style.getPropertyValue(p),
            );
          });
        }
      } catch (e) {}

      window.addEventListener("app_settings_updated", () => {
        location.reload();
      });

      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("changelog-container");

        if (!changelogData || changelogData.length === 0) {
          container.innerHTML =
            "<p class='text-gray-400'>Nenhuma atualização disponível no momento.</p>";
          return;
        }

        let contentHTML = changelogData
          .map(
            (log) => `
            <div class="mb-8 relative z-10 transition-transform duration-300 hover:scale-[1.01]">
              <div class="absolute -left-[51px] top-1.5 w-4 h-4 bg-primary rounded-full shadow-[0_0_15px_rgb(var(--color-primary-rgb)/0.8)] border-[3px] border-surface"></div>
              <div class="flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-3 mb-3">
                <span class="text-2xl font-bold text-primary tracking-wide">v${log.version}</span>
                <span class="text-sm font-medium tracking-widest opacity-80" style="color: var(--color-text-muted)">${log.date}</span>
              </div>
              <ul class="space-y-3 mt-4 text-base font-light" style="color: var(--color-text)">
                ${log.changes
                  .map(
                    (change) => `
                  <li class="flex items-start">
                    <span class="text-primary mr-3 text-lg leading-none mt-1 opacity-80">•</span>
                    <span class="leading-relaxed opacity-90">${change}</span>
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>
        `,
          )
          .join("");

        // Container timeline line
        const timelineLine = `<div class="absolute top-0 bottom-0 left-[19px] w-[2px] bg-primary/20"></div>`;
        container.innerHTML = timelineLine + contentHTML;
      });
    </script>
  </body>
</html>
