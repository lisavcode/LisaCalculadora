<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Lisa - Encomendas</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=2" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- Professions Data (Importing from parent directory) -->
    <script>
      window.dataByProfession = {};
    </script>
    <script src="../professions/alquimista.js"></script>
    <script src="../professions/alfaiate.js"></script>
    <script src="../professions/minerador.js"></script>
    <script src="../professions/artesao.js"></script>
    <script src="../professions/cacador.js"></script>
    <script src="../professions/ferreiro.js"></script>
    <script src="../professions/treinador.js"></script>
    <script src="../professions/desocupado.js"></script>
    <!-- Add other professions as needed -->

    <script>
      // Tailwind Config matching main app
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Outfit", "sans-serif"] },
            safelist: ["text-coin-gz", "text-coin-sz", "text-coin-bz"],
            colors: {
              primary: "var(--color-primary)",
              secondary: "var(--color-secondary)",
              bg: "var(--color-bg)",
              surface: "var(--color-surface)",
              "coin-gz": "var(--color-coin-gz)",
              "coin-sz": "var(--color-coin-sz)",
              "coin-bz": "var(--color-coin-bz)",
            },
            boxShadow: {
              neon: "0 0 5px rgb(var(--color-primary-rgb) / 0.3)",
              "neon-hover": "0 0 10px rgb(var(--color-primary-rgb) / 0.6)",
            },
            animation: {
              "fade-in-down": "fadeInDown 0.3s ease-out",
            },
            keyframes: {
              fadeInDown: {
                "0%": { opacity: "0", transform: "translateY(-10px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <style id="mobile-simplifier">
      @media (max-width: 768px) {
        * {
          transition: none !important;
          animation: none !important;
          backdrop-filter: none !important;
        }
        .glass-card, [class*="glass"] {
          background-color: rgb(var(--color-surface-rgb) / 0.95) !important;
        }
        .shadow-neon, [class*="shadow-neon"], .hover\:shadow-neon:hover {
          box-shadow: none !important;
        }
      }
    </style>
  </head>
  <style type="text/tailwindcss">
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none; /* IE and Edge */
      scrollbar-width: none; /* Firefox */
    }
    html,
    body {
      width: 100%;
      min-height: 100%;
    }
    body {
      background-color: var(--color-bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(0, 0, 0, 0.3) 0, transparent 50%),
        radial-gradient(at 50% 0%, var(--color-surface) 0, transparent 50%),
        radial-gradient(at 100% 0%, var(--color-secondary) 0, transparent 50%);
      overflow-x: hidden;
    }
    @media (min-width: 769px) {
      body {
        background-attachment: fixed;
      }
    }
  </style>
  <body class="bg-bg text-text min-h-screen p-6 pb-32 md:pb-6 font-sans">
    <div class="max-w-7xl mx-auto relative">
      <!-- Header -->
      <header
        class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 md:mb-10 gap-4 pt-10 md:pt-0"
      >
        <div>
          <h1
            class="text-3xl md:text-4xl font-bold text-primary uppercase tracking-wider drop-shadow-lg"
          >
            Encomendas
          </h1>
          <p class="text-muted text-base md:text-lg font-light">
            Gerenciamento de Pedidos
          </p>
        </div>
        <div class="flex gap-3 flex-wrap">
          <button
            onclick="NotesManager.downloadJSON()"
            class="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5 transition-colors text-sm flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
              />
            </svg>
            Exportar
          </button>
          <label
            class="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5 transition-colors text-sm cursor-pointer flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              />
            </svg>
            Restaurar
            <input
              type="file"
              onchange="NotesManager.uploadJSON(this)"
              class="hidden"
              accept=".json"
            />
          </label>
        </div>
      </header>

      <div class="mb-8 flex gap-4">
        <input
          type="text"
          id="search-orders"
          placeholder="Buscar comprador..."
          class="w-full max-w-md bg-surface border border-white/20 rounded-lg px-4 py-3 min-h-[48px] text-white placeholder-gray-400 focus:border-transparent focus:ring-2 focus:ring-primary shadow-inner transition-all duration-200"
        />
      </div>

      <!-- Orders Grid -->
      <div
        id="orders-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- Order Cards will be injected here -->
      </div>

      <!-- Mobile/Desktop Bottom Action Dock -->
      <div
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-sm"
      >
        <button
          onclick="NotesManager.openModal()"
          class="w-full bg-surface/90 backdrop-blur-md border border-primary/30 text-primary rounded-2xl flex items-center justify-center gap-3 py-3 shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5),0_0_15px_rgba(0,238,255,0.2)] hover:bg-primary/10 transition-all cursor-pointer font-bold uppercase tracking-wider outline-none focus:ring-2 focus:ring-primary"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          Nova Encomenda
        </button>
      </div>

      <!-- Order Modal -->
      <div
        id="order-modal"
        class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300"
      >
        <div
          class="glass-card w-full max-w-2xl h-[90vh] max-h-[800px] p-6 rounded-2xl relative transform scale-95 transition-transform duration-300 flex flex-col"
        >
          <button
            onclick="NotesManager.closeModal()"
            class="absolute top-4 right-4 text-muted hover:text-white transition-colors hover:rotate-90 duration-200 outline-none rounded-full focus:ring-2 focus:ring-primary p-1"
            title="Fechar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>

          <h2
            id="modal-title"
            class="text-2xl font-bold text-primary mb-6 flex-shrink-0"
          >
            Nova Encomenda
          </h2>

          <form
            id="order-form"
            onsubmit="NotesManager.saveOrder(event)"
            class="flex flex-col flex-grow overflow-hidden"
          >
            <input type="hidden" name="orderId" id="order-id-input" value="" />

            <div

            >
              <div>
                <label class="block text-sm text-muted mb-1"

                >
                <input
                  type="text"
                  name="buyer"
                  required
                  class="w-full bg-black/20 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-transparent focus:ring-2 focus:ring-primary transition-all duration-200 shadow-inner"
                />
              </div>

              <!-- Products List -->
              <div>
                <label class="block text-sm font-bold text-gray-400 mb-2"
                  >Produtos</label
                >
                <div
                  id="product-list"
                  class="grid grid-cols-2 gap-2 mb-3 max-h-60 overflow-y-auto p-2 custom-scrollbar content-start"
                ></div>

                <button
                  type="button"
                  id="open-picker-btn"
                  onclick="ItemPicker.open()"
                  class="w-full py-3 min-h-[48px] rounded-xl border border-dashed border-primary/50 text-primary font-bold hover:bg-primary/10 hover:border-solid transition-all duration-300 flex justify-center items-center gap-2 group uppercase tracking-widest text-sm relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0a131a]"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 transform group-hover:rotate-180 transition-transform duration-500"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 4v16m8-8H4"
                    />
                  </svg>
                  Adicionar Produto
                </button>
              </div>

              <div class="flex justify-end text-xl font-bold text-primary">
                Total: <span id="total-price" class="ml-2">0bz</span>
              </div>

              <div>
                <label class="block text-sm text-muted mb-1"
                  >Descrição / Observações</label
                >
                <textarea
                  name="description"
                  rows="3"
                  class="w-full bg-black/20 border border-white/20 rounded-lg px-4 py-2 text-white focus:border-transparent focus:ring-2 focus:ring-primary transition-all duration-200 shadow-inner resize-none"
                ></textarea>
              </div>
            </div>

            <div
              class="flex justify-end gap-3 pt-4 border-t border-white/10 flex-shrink-0"
            >
              <button
                type="button"
                onclick="NotesManager.closeModal()"
                class="px-6 py-3 min-h-[48px] rounded-lg border border-white/10 hover:bg-white/5 transition-colors"
              >
                Cancelar
              </button>
              <button
                type="submit"
                class="px-8 py-3 min-h-[48px] bg-primary text-black font-bold rounded-lg transition-all"
                style="color: var(--color-text-on-primary, black)"
              >
                Salvar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- ITEM PICKER MODAL (Pro Max) -->
    <div
      id="item-picker-modal"
      class="fixed inset-0 z-[60] hidden justify-center items-center bg-black/80 transition-opacity duration-300 opacity-0"
    >
      <div
        class="glass-card w-full max-w-5xl h-[90vh] md:h-[85vh] m-4 rounded-2xl flex flex-col shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 border border-primary/20"
      >
        <!-- Picker Header -->
        <div
          class="p-6 border-b border-white/10 flex flex-col gap-4 bg-black/20"
        >
          <div class="flex justify-between items-center">
            <h2 class="text-2xl font-bold text-primary flex items-center gap-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
              Selecionar Produto
            </h2>
            <button
              type="button"
              id="close-picker-btn"
              class="text-gray-400 hover:text-white transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-8 w-8"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >

                  stroke-linejoin="round"
                  stroke-width="2"

              />

                  stroke-linejoin="round"

                />

            <!-- Filters -->
            <div

            >

                <option value="2">Era 2</option>
                <option value="3">Era 3</option>
                <option value="4">Era 4</option>

            <button

              Alquimista

            <button

              Minerador

            <button
              class="picker-tab-btn shrink-0 snap-start min-h-[44px] flex items-center justify-center px-4 py-1.5 rounded-full border border-slate-600 text-slate-400 font-bold text-sm transition-all hover:border-primary hover:text-primary"
              data-tab="artesao"
            >
              Artesão
            </button>
            <button
              class="picker-tab-btn shrink-0 snap-start min-h-[44px] flex items-center justify-center px-4 py-1.5 rounded-full border border-slate-600 text-slate-400 font-bold text-sm transition-all hover:border-primary hover:text-primary"
              data-tab="alfaiate"
            >
              Alfaiate
            </button>
            <button
              class="picker-tab-btn shrink-0 snap-start min-h-[44px] flex items-center justify-center px-4 py-1.5 rounded-full border border-slate-600 text-slate-400 font-bold text-sm transition-all hover:border-primary hover:text-primary"
              data-tab="ferreiro"
            >
              Ferreiro
            </button>
            <button
              class="picker-tab-btn shrink-0 snap-start min-h-[44px] flex items-center justify-center px-4 py-1.5 rounded-full border border-slate-600 text-slate-400 font-bold text-sm transition-all hover:border-primary hover:text-primary"
              data-tab="treinador"
            >
              Treinador
            </button>
            <button
              class="picker-tab-btn shrink-0 snap-start min-h-[44px] flex items-center justify-center px-4 py-1.5 rounded-full border border-slate-600 text-slate-400 font-bold text-sm transition-all hover:border-primary hover:text-primary"
              data-tab="desocupado"
            >
              Desocupado
            </button>
          </div>
        </div>

        <!-- Picker Grid -->
        <div class="flex-grow overflow-y-auto p-6 bg-black/10 custom-scrollbar">
          <div
            id="item-picker-results"
            class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"
          >
            <!-- Cards injected by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Shared Config & Data -->
    <script src="../auth.js"></script>
    <script src="../config.js"></script>
    <!-- Moved settings load to end of body to align with fix -->
    <script src="../settings.js"></script>

    <!-- Logic -->
    <script src="script.js"></script>
    <script>
      (function initEncomendasAuth() {
        const token = AccessControl.getToken();
        const perms = AccessControl.getPermissions(token);
        if (!perms || !perms.encomendas) {
          window.location.href = "../acesso-negado.html";
          return;
        }

        AccessControl.saveProfessionToStorage(perms);

        const allowed = perms.professions || [];
        const allProfs = [
          "cacador",
          "alquimista",
          "minerador",
          "artesao",
          "alfaiate",
          "ferreiro",
          "treinador",
          "desocupado",
        ];
        allProfs.forEach((prof) => {
          if (!allowed.includes(prof)) {
            document.querySelectorAll(`[data-tab="${prof}"]`).forEach((el) => {
              el.style.display = "none";
            });
          }
        });

        document.addEventListener("DOMContentLoaded", function () {
          if (typeof ItemPicker !== "undefined") {
            const saved = localStorage.getItem(AccessControl.PROFESSION_KEY);
            if (saved) ItemPicker.currentTab = saved;
          }
        });

        window.addEventListener("message", function (e) {
          if (e.data && e.data.type === "lisa_token") {
            const newPerms = AccessControl.getPermissions(e.data.token);
            if (newPerms && newPerms.encomendas) {
              sessionStorage.setItem(AccessControl.SESSION_KEY, e.data.token);
              AccessControl.saveProfessionToStorage(newPerms);
              if (typeof ItemPicker !== "undefined") {
                const saved = localStorage.getItem(
                  AccessControl.PROFESSION_KEY,
                );
                if (saved) ItemPicker.currentTab = saved;
              }
            } else if (newPerms && !newPerms.encomendas) {
              window.location.href = "../acesso-negado.html";
            }
          }
        });
      })();
    </script>
  </body>
</html>
