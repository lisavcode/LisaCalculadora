<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lisa Calculadora</title>
    <meta name="description" content="Calculadora de Lisa" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Outfit", "sans-serif"] },
            colors: {
              primary: "rgb(var(--color-primary-rgb) / <alpha-value>)",
              bg: "var(--color-bg)",
            },
          },
        },
      };
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--color-bg, #000);
        color: var(--color-text, white);
        font-family: "Outfit", sans-serif;
        height: 100dvh;
      }

      .app-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100dvh;
        border: none;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
        transition:
          transform 0.6s cubic-bezier(0.7, 0, 0.3, 1),
          opacity 0.4s ease,
          left 0.3s ease,
          width 0.3s ease;
      }
      .app-view.active {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      /* Black Hole / TV Animation Classes */
      .app-view.imploding {
        opacity: 0.8;
        transform: scale(0.01) scaleY(0.02);
        transition:
          transform 0.5s cubic-bezier(0.7, 0, 0.8, 0.2),
          opacity 0.5s ease;
      }

      /* TV Line Effect */
      .tv-line {
        position: fixed;
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        background: #fff;
        transform: scaleX(0);
        opacity: 0;
        pointer-events: none;
      }
      .tv-line.active {
        animation: tv-flash 0.1s ease-out forwards;
      }

      @keyframes tv-flash {
        0% {
          transform: scaleX(0);
          opacity: 0;
        }
        40% {
          transform: scaleX(1);
        }
        70% {
          transform: scaleX(1.1) scaleY(2);
        }
        100% {
          transform: scaleX(0);
          opacity: 0;
        }
      }
      .glass-card {
        background: rgb(var(--color-surface-rgb) / 0.85);
        border: 1px solid rgb(var(--color-primary-rgb) / 0.1);
        backdrop-filter: blur(12px);
      }

      /* Unified Sidebar CSS */
      .app-view {
        width: calc(100vw - 250px);
        left: 250px;
      }
      body.sidebar-collapsed .app-view {
        width: calc(100vw - 80px);
        left: 80px;
      }

      .navbar {
        position: fixed;
        bottom: 0;
        left: 0;
        top: 0;
        width: 250px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: 24px 16px;
        background: rgb(var(--color-surface-rgb) / 0.85);
        border-right: 1px solid rgb(var(--color-primary-rgb) / 0.1);
        z-index: 50;
        box-shadow: 4px 0 25px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(12px);
        gap: 12px;
        transition:
          width 0.3s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body.sidebar-collapsed .navbar {
        width: 80px;
        padding: 24px 8px;
      }
      .navbar.hidden-ui {
        transform: translateX(-100%);
      }

      .brand-sidebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2rem;
        font-weight: 700;
        font-size: 1.5rem;
        color: var(--color-primary);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        width: 100%;
        overflow: hidden;
      }
      .brand-sidebar .brand-text {
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      body.sidebar-collapsed .brand-sidebar .brand-text {
        opacity: 0;
        width: 0;
        display: none;
      }
      body.sidebar-collapsed .brand-sidebar {
        justify-content: center;
      }

      .nav-item {
        color: var(--color-text-muted, rgba(255, 255, 255, 0.4));
        font-size: 0.9rem;
        padding: 12px 16px;
        border-radius: 16px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
        align-items: center;
        gap: 16px;
        min-height: 54px;
        flex: none;
        overflow: hidden;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-item:hover {
        color: var(--color-text);
        background: rgb(var(--color-primary-rgb) / 0.05);
      }
      .nav-item.active {
        color: var(--color-primary);
        background: rgb(var(--color-primary-rgb) / 0.15);
      }

      body.sidebar-collapsed .nav-item {
        justify-content: center;
        padding: 12px;
      }
      body.sidebar-collapsed .nav-item span {
        display: none;
      }
      .nav-item svg {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
      }

      #mobile-sidebar-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 40; /* Below navbar (50) but above app-view */
        backdrop-filter: blur(2px);
      }

      /* Mobile adjustments for Sidebar */
      @media (max-width: 767px) {
        body:not(.sidebar-collapsed) #mobile-sidebar-overlay {
          display: block;
        }

        .app-view {
          width: calc(100vw - 64px) !important;
          left: 64px !important;
        }
        body.sidebar-collapsed .app-view {
          width: calc(100vw - 64px) !important;
          left: 64px !important;
        }

        .navbar {
          width: 220px;
        }
        body.sidebar-collapsed .navbar {
          width: 64px;
        }

        .brand-sidebar {
          font-size: 1.25rem;
        }

        .nav-item {
          font-size: 0.8rem;
        }
      }
    </style>
    <script src="auth.js"></script>
    <style id="mobile-simplifier">
      @media (max-width: 768px) {
        * {
          transition: none !important;
          animation: none !important;
          backdrop-filter: none !important;
        }
        .glass-card, [class*="glass"] {
          background-color: rgb(var(--color-surface-rgb) / 0.95) !important;
        }
        .shadow-neon, [class*="shadow-neon"], .hover\:shadow-neon:hover {
          box-shadow: none !important;
        }
      }
    </style>
  </head>

          </svg>
        </button>
        <!-- Expand Categories -->

          title="Expandir Categorias"
          onclick="(() => {
            const win = document.getElementById('view-calculadora').contentWindow;
            win.document.querySelectorAll('.prof-header').forEach(h => {
              if (h.nextElementSibling.classList.contains('hidden')) h.click();
            });
          })();"
        >

          </svg>
        </button>
        <!-- Retract Categories -->

          class="w-12 h-12 rounded-full glass-card flex items-center justify-center text-primary hover:scale-110 transition-all shadow-[0_0_10px_rgba(0,238,255,0.2)] hover:shadow-[0_0_15px_rgba(0,238,255,0.5)] cursor-pointer"
          title="Retrair Categorias"
          onclick="(() => {
            const win = document.getElementById('view-calculadora').contentWindow;
            win.document.querySelectorAll('.prof-header').forEach(h => {

            });

        </button>
        <!-- Clear Search -->
        <button

          title="Resetar Busca"
          onclick="(() => {

            const input = win.document.getElementById('search-item');

    <script>
      let isAnimating = false;

      // --- Autenticação ---
      (function initAuth() {
        const perms = AccessControl.initHub();
        if (!perms) return;

        const token = AccessControl.getToken();

        function passTokenToIframe(iframe) {
          try {
            if (iframe.contentWindow) {
              iframe.contentWindow.postMessage({ type: "lisa_token", token: token }, "*");
            }
          } catch (e) {}
        }

        document.querySelectorAll("iframe.app-view").forEach((f) => passTokenToIframe(f));

        const tavernaBtn = document.querySelector('.nav-item[data-target="taverna"]');
        const encomendasBtn = document.querySelector('.nav-item[data-target="encomendas"]');
        const calculadoraBtn = document.querySelector('.nav-item[data-target="calculadora"]');

        if (!perms.encomendas && encomendasBtn) {
          encomendasBtn.style.display = "none";
          document.getElementById("view-encomendas").style.display = "none";
        }

        const hasProfessions = perms.professions && perms.professions.length > 0;
        if (!hasProfessions && calculadoraBtn) {
          calculadoraBtn.style.display = "none";
          document.getElementById("view-calculadora").style.display = "none";
        }

        const hasTaverna = perms.tavernas && perms.tavernas.length > 0;
        if (!hasTaverna && tavernaBtn) {
          tavernaBtn.style.display = "none";
          document.getElementById("view-taverna").style.display = "none";
        }

        document.querySelectorAll("iframe.app-view").forEach((iframe) => {
          iframe.addEventListener("load", function () {
            passTokenToIframe(iframe);
          });
        });
      })();

      // --- Sidebar Toggle ---
      function toggleSidebar() {
        document.body.classList.toggle("sidebar-collapsed");
        const isCollapsed =
          document.body.classList.contains("sidebar-collapsed");
        localStorage.setItem("sidebar_collapsed", isCollapsed);
      }

      (function restoreSidebarState() {
        const isCollapsed =
          localStorage.getItem("sidebar_collapsed") === "true";
        if (isCollapsed) {
          document.body.classList.add("sidebar-collapsed");
        } else if (window.innerWidth <= 767) {
          document.body.classList.add("sidebar-collapsed");
          localStorage.setItem("sidebar_collapsed", "true");
        }
      })();

      document.querySelectorAll(".app-view").forEach((view) => {
        view.addEventListener("touchstart", function () {
          if (window.innerWidth <= 767 && !document.body.classList.contains("sidebar-collapsed")) {
            document.body.classList.add("sidebar-collapsed");
            localStorage.setItem("sidebar_collapsed", "true");
          }
        }, { passive: true });
      });

      // --- Controle de Visibilidade UI ---
      function setUIVisibility(visible) {
        const navbar = document.getElementById("main-navbar");
        if (visible) {
          navbar.classList.remove("hidden-ui");
        } else {
          navbar.classList.add("hidden-ui");
        }
      }

      // Escuta eventos globais para ocultar o menu do Hub
      window.addEventListener("hide-hub-ui", () => setUIVisibility(false));
      window.addEventListener("show-hub-ui", () => setUIVisibility(true));

      // --- Sincronização de Cores ---
      function hexToHSL(H) {
        if (H.length == 5) H = H.substring(0, 4);
        if (H.length == 9) H = H.substring(0, 7);
        let r = 0,
          g = 0,
          b = 0;
        if (H.length == 4) {
          r = "0x" + H[1] + H[1];
          g = "0x" + H[2] + H[2];
          b = "0x" + H[3] + H[3];
        } else if (H.length == 7) {
          r = "0x" + H[1] + H[2];
          g = "0x" + H[3] + H[4];
          b = "0x" + H[5] + H[6];
        }
        r /= 255;
        g /= 255;
        b /= 255;
        let cmin = Math.min(r, g, b),
          cmax = Math.max(r, g, b),
          delta = cmax - cmin;
        let h = 0,
          s = 0,
          l = 0;
        if (delta == 0) h = 0;
        else if (cmax == r) h = ((g - b) / delta) % 6;
        else if (cmax == g) h = (b - r) / delta + 2;
        else h = (r - g) / delta + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
        l = (cmax + cmin) / 2;
        s = delta == 0 ? 0 : delta / (1 - Math.abs(2 * l - 1));
        s = +(s * 100).toFixed(1);
        l = +(l * 100).toFixed(1);
        return { h, s, l };
      }

      function hslToHex(h, s, l) {
        s /= 100;
        l /= 100;
        let c = (1 - Math.abs(2 * l - 1)) * s,
          x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
          m = l - c / 2,
          r = 0,
          g = 0,
          b = 0;
        if (0 <= h && h < 60) {
          r = c;
          g = x;
          b = 0;
        } else if (60 <= h && h < 120) {
          r = x;
          g = c;
          b = 0;
        } else if (120 <= h && h < 180) {
          r = 0;
          g = c;
          b = x;
        } else if (180 <= h && h < 240) {
          r = 0;
          g = x;
          b = c;
        } else if (240 <= h && h < 300) {
          r = x;
          g = 0;
          b = c;
        } else if (300 <= h && h < 360) {
          r = c;
          g = 0;
          b = x;
        }
        r = Math.round((r + m) * 255).toString(16);
        g = Math.round((g + m) * 255).toString(16);
        b = Math.round((b + m) * 255).toString(16);
        if (r.length == 1) r = "0" + r;
        if (g.length == 1) g = "0" + g;
        if (b.length == 1) b = "0" + b;
        return "#" + r + g + b;
      }

      function applyThemeColors() {
        const savedTheme = localStorage.getItem("app_theme") || "dark";
        const savedConfigs = localStorage.getItem("app_themes_config");

        if (savedConfigs) {
          try {
            const themes = JSON.parse(savedConfigs);
            const theme = themes[savedTheme];
            if (theme) {
              const root = document.documentElement;
              const hueRotation = parseInt(theme.hue || 0);
              const saturation = parseInt(theme.saturation || 0);
              const lightness = parseInt(theme.lightness || 0);

              for (const [key, value] of Object.entries(theme)) {
                if (key.startsWith("--color-")) {
                  let finalValue = value;
                  if (
                    (hueRotation !== 0 ||
                      saturation !== 0 ||
                      lightness !== 0) &&
                    value.startsWith("#")
                  ) {
                    const isLocked = (theme.lockedKeys || []).includes(key);
                    if (!isLocked) {
                      const hsl = hexToHSL(value);
                      hsl.h = (hsl.h + hueRotation) % 360;
                      if (hsl.h < 0) hsl.h += 360;
                      hsl.s = Math.max(0, Math.min(100, hsl.s + saturation));
                      hsl.l = Math.max(0, Math.min(100, hsl.l + lightness));
                      finalValue = hslToHex(hsl.h, hsl.s, hsl.l);
                    }
                  }
                  root.style.setProperty(key, finalValue);
                  if (finalValue.startsWith("#")) {
                    const r = parseInt(finalValue.slice(1, 3), 16);
                    const g = parseInt(finalValue.slice(3, 5), 16);
                    const b = parseInt(finalValue.slice(5, 7), 16);
                    root.style.setProperty(`${key}-rgb`, `${r} ${g} ${b}`);
                  }
                }
              }

              // Notify iframes
              document.querySelectorAll("iframe").forEach((iframe) => {
                try {
                  if (iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: "app_settings_updated" }, "*");
                  }
                } catch (e) {}
              });
            }
          } catch (e) {
            console.error("Erro ao carregar cores do Hub:", e);
          }
        }
      }

      // Inicializa cores
      applyThemeColors();

      // Escuta mudanças vindas dos Iframes ou outras janelas
      window.addEventListener("app_settings_updated", (e) => {
        applyThemeColors();
      });
      window.addEventListener("storage", (e) => {
        if (e.key === "app_themes_config" || e.key === "app_theme")
          applyThemeColors();
      });

      function switchView(targetId) {
        if (isAnimating) return;

        // Auto-collapse sidebar on mobile
        if (window.innerWidth <= 767 && !isSidebarCollapsed) {
          toggleSidebar();
        }

        const currentActive = document.querySelector(".app-view.active");
        if (currentActive && currentActive.id === `view-${targetId}`) return;

        // Reset UI visibility on switch
        setUIVisibility(true);

        isAnimating = true;

        // Update UI
        document.querySelectorAll(".nav-item").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.target === targetId);
        });

        // Switch Dock Context
        const docks = ['inicio', 'calculadora', 'encomendas', 'taverna', 'atualizacoes'];
        docks.forEach(dock => {
          const el = document.getElementById(`dock-${dock}`);
          if (el) {
            if (dock === targetId) {
              el.classList.remove("hidden");
              el.classList.add("flex");
            } else {
              el.classList.add("hidden");
              el.classList.remove("flex");
            }
          }
        });

        // Save last view preference
        localStorage.setItem("icarus_last_view", targetId);

        const nextView = document.getElementById(`view-${targetId}`);

        if (!nextView.getAttribute("src")) {
          nextView.setAttribute("src", nextView.getAttribute("data-src"));
        }

        currentActive.classList.remove("active");
        nextView.classList.add("active");
        isAnimating = false;
      }

      window.navigateTo = switchView;

      // Restore last view instantly on load
      (function restoreLastView() {
        const lastView = localStorage.getItem("icarus_last_view") || "inicio";
        const targetView = document.getElementById(`view-${lastView}`);
        if (targetView) {
          if (!targetView.getAttribute("src")) {
            targetView.setAttribute("src", targetView.getAttribute("data-src"));
          }
          if (lastView !== "inicio") {
            // Remove active from any current
            document
              .querySelectorAll(".app-view")
              .forEach((el) => el.classList.remove("active"));
            targetView.classList.add("active");

            // Update nav buttons
            document.querySelectorAll(".nav-item").forEach((btn) => {
              btn.classList.toggle("active", btn.dataset.target === lastView);
            });

            // Restore Dock Context
            const docks = ['inicio', 'calculadora', 'encomendas', 'taverna', 'atualizacoes'];
            docks.forEach(dock => {
              const el = document.getElementById(`dock-${dock}`);
              if (el) {
                if (dock === lastView) {
                  el.classList.remove("hidden");
                  el.classList.add("flex");
                } else {
                  el.classList.add("hidden");
                  el.classList.remove("flex");
                }
              }
            });
          }
        }
      })();
    </script>
