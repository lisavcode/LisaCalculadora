<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lisa Calculadora</title>
    <meta name="description" content="Calculadora de Lisa" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Outfit", "sans-serif"] },
            colors: {
              primary: "rgb(var(--color-primary-rgb) / <alpha-value>)",
              bg: "var(--color-bg)",
            },
          },
        },
      };
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--color-bg, #000);
        color: var(--color-text, white);
        font-family: "Outfit", sans-serif;
      }

      .app-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
        transition:
          transform 0.6s cubic-bezier(0.7, 0, 0.3, 1),
          opacity 0.4s ease;
      }
      .app-view.active {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      /* Black Hole / TV Animation Classes */
      .app-view.imploding {
        opacity: 0.8;
        transform: scale(0.01) scaleY(0.02);
        transition:
          transform 0.5s cubic-bezier(0.7, 0, 0.8, 0.2),
          opacity 0.5s ease;
      }

      /* TV Line Effect */
      .tv-line {
        position: fixed;
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        background: #fff;
        transform: scaleX(0);
        opacity: 0;
        pointer-events: none;
      }
      .tv-line.active {
        animation: tv-flash 0.1s ease-out forwards;
      }

      @keyframes tv-flash {
        0% {
          transform: scaleX(0);
          opacity: 0;
        }
        40% {
          transform: scaleX(1);
        }
        70% {
          transform: scaleX(1.1) scaleY(2);
        }
        100% {
          transform: scaleX(0);
          opacity: 0;
        }
      }

      /* Minimalist Navbar */
      .navbar {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgb(
          var(--color-surface-rgb) / 0.85
        ); /* Aumentado a opacidade já que o blur saiu */
        border: 1px solid rgb(var(--color-primary-rgb) / 0.1);
        border-radius: 20px;
        padding: 6px;
        display: flex;
        gap: 4px;
        z-index: 50; /* Baixado para permitir que modais fiquem por cima se necessário */
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .navbar.hidden-ui {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(100px);
      }
      .navbar:hover {
        background: rgb(var(--color-surface-rgb) / 0.8);
        border-color: rgb(var(--color-primary-rgb) / 0.3);
      }

      .nav-item {
        color: var(--color-text-muted, rgba(255, 255, 255, 0.4));
        padding: 10px 20px;
        border-radius: 14px;
        font-weight: 500;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .nav-item:hover {
        color: var(--color-text);
        background: rgb(var(--color-primary-rgb) / 0.05);
      }
      .nav-item.active {
        color: var(--color-primary);
        background: rgb(var(--color-primary-rgb) / 0.15);
      }
    </style>
  </head>
  <body>
    <iframe id="view-inicio" src="inicio.html" class="app-view active"></iframe>
    <iframe
      id="view-calculadora"
      src="calculadora/index.html"
      class="app-view"
    ></iframe>
    <iframe
      id="view-encomendas"
      src="encomendas/index.html"
      class="app-view"
    ></iframe>

    <div id="tv-line" class="tv-line"></div>

    <nav class="navbar" id="main-navbar">
      <button
        class="nav-item active"
        data-target="inicio"
        onclick="switchView('inicio')"
      >
        Início
      </button>
      <button
        class="nav-item"
        data-target="calculadora"
        onclick="switchView('calculadora')"
      >
        Calculadora
      </button>
      <button
        class="nav-item"
        data-target="encomendas"
        onclick="switchView('encomendas')"
      >
        Encomendas
      </button>
    </nav>

    <script>
      let isAnimating = false;

      // --- Controle de Visibilidade UI ---
      function setUIVisibility(visible) {
        const navbar = document.getElementById("main-navbar");
        if (visible) {
          navbar.classList.remove("hidden-ui");
        } else {
          navbar.classList.add("hidden-ui");
        }
      }

      // Escuta eventos globais para ocultar o menu do Hub
      window.addEventListener("hide-hub-ui", () => setUIVisibility(false));
      window.addEventListener("show-hub-ui", () => setUIVisibility(true));

      // --- Sincronização de Cores ---
      function hexToHSL(H) {
        if (H.length == 5) H = H.substring(0, 4);
        if (H.length == 9) H = H.substring(0, 7);
        let r = 0,
          g = 0,
          b = 0;
        if (H.length == 4) {
          r = "0x" + H[1] + H[1];
          g = "0x" + H[2] + H[2];
          b = "0x" + H[3] + H[3];
        } else if (H.length == 7) {
          r = "0x" + H[1] + H[2];
          g = "0x" + H[3] + H[4];
          b = "0x" + H[5] + H[6];
        }
        r /= 255;
        g /= 255;
        b /= 255;
        let cmin = Math.min(r, g, b),
          cmax = Math.max(r, g, b),
          delta = cmax - cmin;
        let h = 0,
          s = 0,
          l = 0;
        if (delta == 0) h = 0;
        else if (cmax == r) h = ((g - b) / delta) % 6;
        else if (cmax == g) h = (b - r) / delta + 2;
        else h = (r - g) / delta + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
        l = (cmax + cmin) / 2;
        s = delta == 0 ? 0 : delta / (1 - Math.abs(2 * l - 1));
        s = +(s * 100).toFixed(1);
        l = +(l * 100).toFixed(1);
        return { h, s, l };
      }

      function hslToHex(h, s, l) {
        s /= 100;
        l /= 100;
        let c = (1 - Math.abs(2 * l - 1)) * s,
          x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
          m = l - c / 2,
          r = 0,
          g = 0,
          b = 0;
        if (0 <= h && h < 60) {
          r = c;
          g = x;
          b = 0;
        } else if (60 <= h && h < 120) {
          r = x;
          g = c;
          b = 0;
        } else if (120 <= h && h < 180) {
          r = 0;
          g = c;
          b = x;
        } else if (180 <= h && h < 240) {
          r = 0;
          g = x;
          b = c;
        } else if (240 <= h && h < 300) {
          r = x;
          g = 0;
          b = c;
        } else if (300 <= h && h < 360) {
          r = c;
          g = 0;
          b = x;
        }
        r = Math.round((r + m) * 255).toString(16);
        g = Math.round((g + m) * 255).toString(16);
        b = Math.round((b + m) * 255).toString(16);
        if (r.length == 1) r = "0" + r;
        if (g.length == 1) g = "0" + g;
        if (b.length == 1) b = "0" + b;
        return "#" + r + g + b;
      }

      function applyThemeColors() {
        const savedTheme = localStorage.getItem("app_theme") || "dark";
        const savedConfigs = localStorage.getItem("app_themes_config");

        if (savedConfigs) {
          try {
            const themes = JSON.parse(savedConfigs);
            const theme = themes[savedTheme];
            if (theme) {
              const root = document.documentElement;
              const hueRotation = parseInt(theme.hue || 0);
              const saturation = parseInt(theme.saturation || 0);
              // Aplicar variáveis principais
              for (const [key, value] of Object.entries(theme)) {
                if (key.startsWith("--color-")) {
                  let finalValue = value;
                  if (
                    (hueRotation !== 0 || saturation !== 0) &&
                    value.startsWith("#")
                  ) {
                    const isLocked = (theme.lockedKeys || []).includes(key);
                    if (!isLocked) {
                      const hsl = hexToHSL(value);
                      hsl.h = (hsl.h + hueRotation) % 360;
                      if (hsl.h < 0) hsl.h += 360;
                      hsl.s = Math.max(0, Math.min(100, hsl.s + saturation));
                      finalValue = hslToHex(hsl.h, hsl.s, hsl.l);
                    }
                  }
                  root.style.setProperty(key, finalValue);
                  // Também gera a versão RGB para transparências do Tailwind/CSS
                  if (finalValue.startsWith("#")) {
                    const r = parseInt(finalValue.slice(1, 3), 16);
                    const g = parseInt(finalValue.slice(3, 5), 16);
                    const b = parseInt(finalValue.slice(5, 7), 16);
                    root.style.setProperty(`${key}-rgb`, `${r} ${g} ${b}`);
                  }
                }
              }

              // --- BROADCAST PARA FILHOS ---
              // Notifica todos os iframes para que eles também se atualizem
              document.querySelectorAll("iframe").forEach((iframe) => {
                try {
                  if (iframe.contentWindow) {
                    iframe.contentWindow.dispatchEvent(
                      new CustomEvent("app_settings_updated"),
                    );
                  }
                } catch (e) {
                  /* Silencia erros de cross-origin se houver */
                }
              });
            }
          } catch (e) {
            console.error("Erro ao carregar cores do Hub:", e);
          }
        }
      }

      // Inicializa cores
      applyThemeColors();

      // Escuta mudanças vindas dos Iframes ou outras janelas
      window.addEventListener("app_settings_updated", (e) => {
        applyThemeColors();
      });
      window.addEventListener("storage", (e) => {
        if (e.key === "app_themes_config" || e.key === "app_theme")
          applyThemeColors();
      });

      function switchView(targetId) {
        if (isAnimating) return;

        const currentActive = document.querySelector(".app-view.active");
        if (currentActive && currentActive.id === `view-${targetId}`) return;

        // Reset UI visibility on switch
        setUIVisibility(true);

        isAnimating = true;

        // Update UI
        document.querySelectorAll(".nav-item").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.target === targetId);
        });

        // Save last view preference
        localStorage.setItem("icarus_last_view", targetId);

        const tvLine = document.getElementById("tv-line");
        const nextView = document.getElementById(`view-${targetId}`);

        // Start Implosion
        currentActive.classList.add("imploding");

        setTimeout(() => {
          tvLine.classList.add("active");

          setTimeout(() => {
            currentActive.classList.remove("active", "imploding");
            nextView.classList.add("active");

            setTimeout(() => {
              tvLine.classList.remove("active");
              isAnimating = false;
            }, 300);
          }, 300);
        }, 300);
      }

      window.navigateTo = switchView;

      // Restore last view instantly on load
      (function restoreLastView() {
        const lastView = localStorage.getItem("icarus_last_view");
        if (lastView && lastView !== "inicio") {
          const targetView = document.getElementById(`view-${lastView}`);
          if (targetView) {
            // Remove active from any current
            document
              .querySelectorAll(".app-view")
              .forEach((el) => el.classList.remove("active"));
            targetView.classList.add("active");

            // Update nav buttons
            document.querySelectorAll(".nav-item").forEach((btn) => {
              btn.classList.toggle("active", btn.dataset.target === lastView);
            });
          }
        }
      })();
    </script>
    <script src="changelog_data.js"></script>
    <script src="changelog.js"></script>
  </body>
</html>
