<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso Restrito — Lisa Calc</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-primary: #00eeff;
        --color-primary-rgb: 0 238 255;
        --color-bg: #050508;
        --color-surface: #0d0d14;
        --color-surface-rgb: 13 13 20;
        --color-text: #ffffff;
        --color-text-muted: rgba(255, 255, 255, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: "Outfit", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
        padding: 1.5rem 0;
      }
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
      }
      .card {
        background: rgb(var(--color-surface-rgb) / 0.85);
        border: 1px solid rgb(var(--color-primary-rgb) / 0.18);
        backdrop-filter: blur(16px);
        border-radius: 2rem;
        padding: 3rem 2.5rem;
        max-width: 480px;
        width: 90%;
        position: relative;
        z-index: 10;
        box-shadow:
          0 0 60px rgb(var(--color-primary-rgb) / 0.08),
          0 24px 64px rgb(0 0 0 / 0.5);
        text-align: center;
      }
      @media (max-width: 480px) {
        .card {
          padding: 2rem 1.25rem;
          border-radius: 1.25rem;
          width: 94%;
        }
      }
      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgb(var(--color-primary-rgb) / 0.1);
        border: 1px solid rgb(var(--color-primary-rgb) / 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        box-shadow: 0 0 30px rgb(var(--color-primary-rgb) / 0.2);
      }
      h1 {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-text);
        margin: 0 0 0.5rem;
      }
      .subtitle {
        color: var(--color-text-muted);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        font-weight: 400;
      }
      .input-wrap {
        position: relative;
        margin-bottom: 1rem;
      }
      input#codigo {
        width: 100%;
        background: rgb(var(--color-surface-rgb) / 0.6);
        border: 1px solid rgb(var(--color-primary-rgb) / 0.25);
        border-radius: 1rem;
        padding: 1rem 1.25rem;
        font-family: "Outfit", monospace;
        font-size: 0.9rem;
        color: var(--color-text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        letter-spacing: 0.03em;
      }
      input#codigo:focus {
        border-color: rgb(var(--color-primary-rgb) / 0.6);
        box-shadow: 0 0 0 3px rgb(var(--color-primary-rgb) / 0.1);
      }
      input#codigo.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
      }
      .btn-primary {
        width: 100%;
        padding: 1rem;
        background: var(--color-primary);
        color: #000;
        border: none;
        border-radius: 1rem;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 0 24px rgb(var(--color-primary-rgb) / 0.35);
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 0 36px rgb(var(--color-primary-rgb) / 0.55);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .error-msg {
        color: #f87171;
        font-size: 0.82rem;
        margin-top: 0.5rem;
        display: none;
      }
      .divider {
        border: none;
        border-top: 1px solid rgb(var(--color-primary-rgb) / 0.1);
        margin: 1.5rem 0;
      }
      .hint {
        font-size: 0.78rem;
        color: var(--color-text-muted);
      }
      .discord-card {
        margin-top: 1rem;
        background: #23272a;
        border-radius: 1rem;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        width: 100%;
        box-sizing: border-box;
      }
      .discord-banner {
        height: 64px;
        background: linear-gradient(135deg, #5865f2 0%, #3b3f8c 100%);
        position: relative;
      }
      .discord-avatar-wrap {
        position: absolute;
        bottom: -24px;
        left: 16px;
      }
      .discord-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid #23272a;
        object-fit: cover;
        display: block;
      }
      .discord-avatar-placeholder {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid #23272a;
        background: #5865f2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
      }
      .discord-body {
        padding: 2rem 1rem 1rem;
        text-align: left;
      }
      .discord-username {
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        line-height: 1.2;
      }
      .discord-tag {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 0.75rem;
      }
      .discord-msg-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.55rem 1rem;
        background: #5865f2;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .discord-msg-btn:hover {
        background: #4752c4;
      }
      .discord-loading {
        text-align: center;
        padding: 1.5rem;
        color: rgba(255,255,255,0.3);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div
      class="blob"
      style="
        width: 28rem;
        height: 28rem;
        top: -8%;
        left: -8%;
        background-color: var(--color-primary);
        opacity: 0.08;
      "
    ></div>
    <div
      class="blob"
      style="
        width: 36rem;
        height: 36rem;
        bottom: -12%;
        right: -12%;
        background-color: #6366f1;
        opacity: 0.07;
      "
    ></div>

    <div class="card">
      <div class="icon-wrap">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          fill="none"
          viewBox="0 0 24 24"
          stroke="var(--color-primary)"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
          />
        </svg>
      </div>

      <h1>Acesso Restrito</h1>
      <p class="subtitle">
        Esta área requer um código de acesso.
        <br />Cole seu código abaixo para continuar.
      </p>

      <div class="input-wrap">
        <input
          id="codigo"
          type="text"
          placeholder="Cole seu código de acesso aqui"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          onkeydown="if (event.key === 'Enter') acessar();"
        />
      </div>
      <p class="error-msg" id="erro-msg">
        Código inválido. Verifique e tente novamente.
      </p>

      <button class="btn-primary" onclick="acessar()">Acessar</button>

      <hr class="divider" />
      <p class="hint">
        Solicite seu código informando sua profissão. Entre em contato com
        <strong>lisa.dev</strong> pelo Discord:
      </p>

      <div class="discord-card" id="discord-card">
        <div class="discord-loading" id="discord-loading">Carregando perfil...</div>
      </div>
    </div>

    <script src="auth.js"></script>
    <script>
      const DISCORD_USER_ID = "321283841950220299";
      const DISCORD_PROFILE_URL = `https://discord.com/users/${DISCORD_USER_ID}`;

      (function loadDiscordCard() {
        fetch(`https://discord-lookup-api.vercel.app/v1/user/${DISCORD_USER_ID}`)
          .then((r) => r.json())
          .then((data) => {
            const card = document.getElementById("discord-card");
            const name = data.username || "lisa.dev";
            const displayName = data.global_name || name;

            const avatarUrl = data.avatar?.link
              ? data.avatar.link + (data.avatar.is_animated ? ".gif" : ".png") + "?size=128"
              : `https://cdn.discordapp.com/embed/avatars/0.png`;

            let bannerStyle = `background: linear-gradient(135deg, ${data.banner?.color || "#5865f2"}cc 0%, ${data.banner?.color || "#3b3f8c"}66 100%);`;
            if (data.banner?.link) {
              const bannerUrl = data.banner.link + (data.banner.is_animated ? ".gif" : ".png") + "?size=480";
              bannerStyle = `background-image: url('${bannerUrl}'); background-size: cover; background-position: center;`;
            }

            card.innerHTML = `
              <div class="discord-banner" style="${bannerStyle}">
                <div class="discord-avatar-wrap">
                  <img class="discord-avatar" src="${avatarUrl}" alt="${displayName}" />
                </div>
              </div>
              <div class="discord-body">
                <div class="discord-username">${displayName}</div>
                <div class="discord-tag">@${name}</div>
                <a class="discord-msg-btn" href="${DISCORD_PROFILE_URL}" target="_blank" rel="noopener">
                  Entrar em contato
                </a>
              </div>
            `;
          })
          .catch(() => {
            document.getElementById("discord-card").innerHTML = `
              <div class="discord-body" style="text-align:center">
                <a class="discord-msg-btn" href="${DISCORD_PROFILE_URL}" target="_blank" rel="noopener">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
                  </svg>
                  lisa.dev no Discord
                </a>
              </div>
            `;
          });
      })();

      (function () {
        const token = AccessControl.getToken();
        if (token && AccessControl.getPermissions(token)) {
          window.location.href = "./" + "?" + token;
        }
      })();

      function acessar() {
        const input = document.getElementById("codigo");
        const erroMsg = document.getElementById("erro-msg");
        const codigo = input.value.trim();

        input.classList.remove("error");
        erroMsg.style.display = "none";

        if (!codigo) {
          input.classList.add("error");
          erroMsg.textContent = "Digite um código de acesso.";
          erroMsg.style.display = "block";
          return;
        }

        const perms = AccessControl.getPermissions(codigo);
        if (!perms) {
          input.classList.add("error");
          erroMsg.textContent = "Código inválido. Verifique e tente novamente.";
          erroMsg.style.display = "block";
          input.focus();
          return;
        }

        sessionStorage.setItem(AccessControl.SESSION_KEY, codigo);
        window.location.href = "./" + "?" + encodeURIComponent(codigo);
      }
    </script>
  </body>
</html>
