<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Outfit", "sans-serif"] },
            colors: {
              primary: "rgb(var(--color-primary-rgb) / <alpha-value>)",
              bg: "var(--color-bg)",
              surface: "var(--color-surface)",
            },
            boxShadow: {
              neon: "0 0 15px rgb(var(--color-primary-rgb) / 0.4)",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --color-primary-rgb: 0 238 255;
      }
      body {
        background-color: var(--color-bg, #050508);
        color: var(--color-text, white);
      }
      .glass-card {
        background: rgb(var(--color-surface-rgb) / 0.8);
        border: 1px solid rgb(var(--color-primary-rgb) / 0.2);
      }
      .text-primary {
        color: var(--color-primary, #00eeff);
      }
      .bg-primary {
        background-color: var(--color-primary, #00eeff);
      }
      .border-primary {
        border-color: var(--color-primary, #00eeff);
      }
    </style>
    <script>
      function hexToHSL(H) {
        if (H.length == 5) H = H.substring(0, 4);
        if (H.length == 9) H = H.substring(0, 7);
        let r = 0,
          g = 0,
          b = 0;
        if (H.length == 4) {
          r = "0x" + H[1] + H[1];
          g = "0x" + H[2] + H[2];
          b = "0x" + H[3] + H[3];
        } else if (H.length == 7) {
          r = "0x" + H[1] + H[2];
          g = "0x" + H[3] + H[4];
          b = "0x" + H[5] + H[6];
        }
        r /= 255;
        g /= 255;
        b /= 255;
        let cmin = Math.min(r, g, b),
          cmax = Math.max(r, g, b),
          delta = cmax - cmin;
        let h = 0,
          s = 0,
          l = 0;
        if (delta == 0) h = 0;
        else if (cmax == r) h = ((g - b) / delta) % 6;
        else if (cmax == g) h = (b - r) / delta + 2;
        else h = (r - g) / delta + 4;
        h = Math.round(h * 60);
        if (h < 0) h += 360;
        l = (cmax + cmin) / 2;
        s = delta == 0 ? 0 : delta / (1 - Math.abs(2 * l - 1));
        s = +(s * 100).toFixed(1);
        l = +(l * 100).toFixed(1);
        return { h, s, l };
      }

      function hslToHex(h, s, l) {
        s /= 100;
        l /= 100;
        let c = (1 - Math.abs(2 * l - 1)) * s,
          x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
          m = l - c / 2,
          r = 0,
          g = 0,
          b = 0;
        if (0 <= h && h < 60) {
          r = c;
          g = x;
          b = 0;
        } else if (60 <= h && h < 120) {
          r = x;
          g = c;
          b = 0;
        } else if (120 <= h && h < 180) {
          r = 0;
          g = c;
          b = x;
        } else if (180 <= h && h < 240) {
          r = 0;
          g = x;
          b = c;
        } else if (240 <= h && h < 300) {
          r = x;
          g = 0;
          b = c;
        } else if (300 <= h && h < 360) {
          r = c;
          g = 0;
          b = x;
        }
        r = Math.round((r + m) * 255).toString(16);
        g = Math.round((g + m) * 255).toString(16);
        b = Math.round((b + m) * 255).toString(16);
        if (r.length == 1) r = "0" + r;
        if (g.length == 1) g = "0" + g;
        if (b.length == 1) b = "0" + b;
        return "#" + r + g + b;
      }

      function applyThemeColors() {
        const savedTheme = localStorage.getItem("app_theme") || "dark";
        const savedConfigs = localStorage.getItem("app_themes_config");

        if (savedConfigs) {
          try {
            const themes = JSON.parse(savedConfigs);
            const theme = themes[savedTheme];
            if (theme) {
              const root = document.documentElement;
              const hueRotation = parseInt(theme.hue || 0);
              const saturation = parseInt(theme.saturation || 0);
              const lightness = parseInt(theme.lightness || 0);
              for (const [key, value] of Object.entries(theme)) {
                if (key.startsWith("--color-")) {
                  let finalValue = value;
                  if (
                    (hueRotation !== 0 ||
                      saturation !== 0 ||
                      lightness !== 0) &&
                    value.startsWith("#")
                  ) {
                    const isLocked = (theme.lockedKeys || []).includes(key);
                    if (!isLocked) {
                      const hsl = hexToHSL(value);
                      hsl.h = (hsl.h + hueRotation) % 360;
                      if (hsl.h < 0) hsl.h += 360;
                      hsl.s = Math.max(0, Math.min(100, hsl.s + saturation));
                      hsl.l = Math.max(0, Math.min(100, hsl.l + lightness));
                      finalValue = hslToHex(hsl.h, hsl.s, hsl.l);
                    }
                  }
                  root.style.setProperty(key, finalValue);
                  if (finalValue.startsWith("#")) {
                    const r = parseInt(finalValue.slice(1, 3), 16);
                    const g = parseInt(finalValue.slice(3, 5), 16);
                    const b = parseInt(finalValue.slice(5, 7), 16);
                    root.style.setProperty(`${key}-rgb`, `${r} ${g} ${b}`);
                  }
                }
              }
            }
          } catch (e) {
            console.error("Erro no Início:", e);
          }
        }
      }

      applyThemeColors();
      window.addEventListener("app_settings_updated", applyThemeColors);
      window.addEventListener("storage", (e) => {
        if (e.key === "app_themes_config" || e.key === "app_theme")
          applyThemeColors();
      });
    </script>
  </head>

        A ferramenta definitiva para impulsionar suas finanças e auxiliar no
        gerenciamento das suas encomendas de forma inteligente e rápida.
      </p>

      <div

          style="
            background-color: var(--color-primary);
            color: var(--color-text-on-primary, black);
            box-shadow: 0 0 25px rgb(var(--color-primary-rgb) / 0.4);
          "
        >
          Acessar Calculadora
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 ml-3 transform group-hover:translate-x-2 transition-transform"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 7l5 5m0 0l-5 5m5-5H6"
            />
          </svg>
        </button>
        <button
          onclick="window.parent.navigateTo('encomendas', 'ENCOMENDAS')"
          class="group relative w-full sm:w-auto sm:min-w-[240px] min-h-[64px] px-4 sm:px-8 flex items-center justify-center font-bold text-base sm:text-lg md:text-xl rounded-2xl hover:bg-white/5 transition-all duration-300 uppercase tracking-widest overflow-hidden backdrop-blur-sm"
          style="
            border: 1px solid rgb(var(--color-primary-rgb) / 0.3);
            color: var(--color-primary);
          "
        >
          Suas Encomendas
        </button>

        <button
          onclick="
            document.getElementById('contact-modal').classList.remove('hidden');
            setTimeout(() => {
              document
                .getElementById('contact-modal')
                .classList.remove('opacity-0');
              document
                .getElementById('contact-content')
                .classList.remove('scale-95');
            }, 10);
          "
          class="group relative w-full sm:w-auto sm:min-w-[240px] min-h-[64px] px-4 sm:px-8 flex items-center justify-center font-bold text-base sm:text-lg md:text-xl rounded-2xl hover:bg-white/5 transition-all duration-300 uppercase tracking-widest overflow-hidden backdrop-blur-sm"
          style="
            border: 1px solid rgb(var(--color-text-muted) / 0.3);
            color: var(--color-text-muted);
          "
        >
          Entrar em Contato
        </button>

    <!-- Contact Modal -->
    <div
      id="contact-modal"
      class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300"
      onclick="
        if (event.target === this) {
          this.classList.add('opacity-0');
          document.getElementById('contact-content').classList.add('scale-95');
          setTimeout(() => this.classList.add('hidden'), 300);
        }
      "
    >

        id="contact-content"
        class="bg-surface/90 backdrop-blur-xl border border-primary/30 p-8 rounded-3xl max-w-sm w-full transform scale-95 transition-transform duration-300 relative shadow-[0_0_40px_rgba(0,238,255,0.15)] text-center"
      >
        <button
          class="absolute top-4 right-4 text-gray-400 hover:text-white"
          onclick="
            document.getElementById('contact-modal').classList.add('opacity-0');
            document
              .getElementById('contact-content')
              .classList.add('scale-95');
            setTimeout(
              () =>
                document
                  .getElementById('contact-modal')
                  .classList.add('hidden'),
              300,
            );
          "
        >

            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
